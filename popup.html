<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Bookmark to Obsidian</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>X Bookmark to Obsidian</h1>
      <p class="subtitle">点击 X 收藏按钮后，帖子会自动进入你的 Obsidian 待整理区。</p>

      <section class="card">
        <h2>保存路径</h2>
        <label class="field-label" for="output-dir">Obsidian 绝对路径</label>
        <input id="output-dir" class="text-input mono" type="text" placeholder="/Users/yourname/Documents/your-vault/1-输入/01-待整理" />
        <div class="button-row">
          <button id="save-dir" type="button">保存设置</button>
          <button id="pick-dir" type="button" class="secondary">选择文件夹</button>
        </div>
        <p id="save-dir-status" class="helper-text">建议填写到你自己的收件箱目录。</p>
      </section>

      <section class="card">
        <h2>运行状态</h2>
        <p id="native-status">正在检查 Native Host...</p>
        <p id="last-result">最近一次保存：暂无记录</p>
      </section>

      <section class="card">
        <h2>安装提醒</h2>
        <ol>
          <li>在 <span class="mono">chrome://extensions</span> 打开开发者模式。</li>
          <li>加载这个扩展目录。</li>
          <li>运行 <span class="mono">native-host/install-macos.sh &lt;扩展ID&gt;</span>。</li>
          <li>重启 Chrome。</li>
        </ol>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
